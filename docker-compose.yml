services:
  postgres:
    image: postgres:16
    container_name: pgtop-postgres
    environment:
      POSTGRES_USER: pgtop
      POSTGRES_PASSWORD: pgtop
      POSTGRES_DB: pgtop
    ports:
      # 5433 наружу, чтобы не конфликтовать с локально установленным Postgres на 5432
      - "5433:5432"
    volumes:
      - pgtop-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pgtop -d pgtop"]
      interval: 2s
      timeout: 3s
      retries: 20

  load-generator:
    image: postgres:16
    container_name: pgtop-load-generator
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: pgtop
      PGPASSWORD: pgtop
      PGDATABASE: pgtop
    volumes:
      - ./scripts:/scripts:ro
    entrypoint: ["/bin/bash", "/scripts/load.sh"]
    restart: unless-stopped

volumes:
  pgtop-data:
